<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An interactive 3D seascape with touch controls and ambient wind.">
    <meta name="author" content="Lewis Dryburgh">
    <meta name="theme-color" content="#cce3eb">
    
    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lewdry.github.io/outatsea">
    <meta property="og:title" content="Out at sea">
    <meta property="og:description" content="An interactive 3D seascape with touch controls and ambient wind.">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://lewdry.github.io/outatsea">
    
    <title>Out at sea</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #cce3eb;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>

    <script async src="lib/es-module-shims/es-module-shims.js"></script>

    <script type="importmap">
      {
        "imports": {
          "three": "./lib/three/three.module.js",
          "three/addons/": "./lib/three/"
        }
      }
    </script>

    <style>
        body {
            cursor: grab;
        }
        body.grabbing {
            cursor: grabbing;
        }
    </style>
</head>
<body>

    <script type="module">
        import * as THREE from 'three';
        import { Water } from 'three/addons/objects/Water.js';
        import { Sky } from 'three/addons/objects/Sky.js';

        let scene, camera, renderer, water, sky, sun;
        let horizontalAngle = 0;
        let sunElevation = 165;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        const keysHeld = new Set();
        let audioContext = null;
        let isWindowActive = true;
        let windNodes = null;
        
        // Frame rate variables
        const clock = new THREE.Clock();
        let delta = 0;
        const interval = 1 / 60; // 60fps target

        init();
        animate();

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 20000);
            // Keep camera stationary at center, rotate its orientation for orbit
            camera.position.set(0, 15, 0);

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.4;
            document.body.appendChild(renderer.domElement);

            // 3.5. Mouse/Touch Controls Setup
            renderer.domElement.addEventListener('mousedown', onMouseDown, false);
            renderer.domElement.addEventListener('mousemove', onMouseMove, false);
            renderer.domElement.addEventListener('mouseup', onMouseUp, false);
            renderer.domElement.addEventListener('touchstart', onTouchStart, false);
            renderer.domElement.addEventListener('touchmove', onTouchMove, false);
            renderer.domElement.addEventListener('touchend', onTouchEnd, false);

            // 4. Sun Position (Placed low on the horizon for a sunset/sunrise effect)
            sun = new THREE.Vector3();
            updateSunPosition();

            // 5. Water Setup
            const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
            
            // Using the official texture hosted locally
            const textureLoader = new THREE.TextureLoader();
            const normalMapUrl = 'assets/textures/waternormals.jpg';
            
            water = new Water(
                waterGeometry,
                {
                    textureWidth: 512,
                    textureHeight: 512,
                    waterNormals: textureLoader.load(normalMapUrl, function (texture) {
                        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                    }),
                    sunDirection: sun.clone().normalize(),
                    sunColor: 0xffffff,
                    waterColor: 0x001e0f,
                    distortionScale: 3.7,
                }
            );
            water.rotation.x = -Math.PI / 2; // Rotate flat to form the floor
            scene.add(water);

            // 6. Sky Setup
            sky = new Sky();
            sky.scale.setScalar(10000);
            scene.add(sky);

            const skyUniforms = sky.material.uniforms;
            skyUniforms['turbidity'].value = 5;
            skyUniforms['rayleigh'].value = 2;
            skyUniforms['mieCoefficient'].value = 0.005;
            skyUniforms['mieDirectionalG'].value = 0.8;
            skyUniforms['sunPosition'].value.copy(sun);

            // 7. Handle Window Resizing
            window.addEventListener('resize', onWindowResize);

            // 3.6. Keyboard Controls
            window.addEventListener('keydown', onKeyDown, false);
            window.addEventListener('keyup', onKeyUp, false);

            // 8. Initialize Ambient Audio (Algorithmic)
            initAudio();
        }

        function initAudio() {
            // Don't create AudioContext yet — wait for first user gesture
            const startAudio = async () => {
                if (audioContext) {
                    // Already exists — just try to resume
                    await tryResumeAudio();
                    return;
                }
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    await audioContext.resume();
                    createWindAmbience(audioContext);
                } catch (err) {
                    console.error('Audio init failed:', err);
                }
            };

            // User gesture listeners — covers iframe context too
            ['click', 'touchstart', 'touchend', 'keydown', 'pointerdown'].forEach(evt => {
                document.addEventListener(evt, startAudio, { once: false, passive: true });
            });

            // Visibility & focus recovery
            document.addEventListener('visibilitychange', async () => {
                if (document.hidden) {
                    isWindowActive = false;
                } else {
                    isWindowActive = true;
                    await tryResumeAudio();
                }
            });

            window.addEventListener('blur', () => {
                isWindowActive = false;
            });

            window.addEventListener('focus', () => {
                isWindowActive = true;
                tryResumeAudio();
            });

            window.addEventListener('pageshow', () => tryResumeAudio());

            // iOS-specific: poll for interrupted state
            setInterval(() => {
                if (audioContext && (audioContext.state === 'suspended' || audioContext.state === 'interrupted')) {
                    tryResumeAudio();
                }
            }, 2000);
        }

        async function tryResumeAudio() {
            if (!audioContext) return;
            try {
                if (audioContext.state !== 'running') {
                    await audioContext.resume();
                }
                // If nodes got lost (can happen after interruption), rebuild them
                if (!windNodes) {
                    createWindAmbience(audioContext);
                }
            } catch (err) {
                // Context may be in a bad state — try rebuilding entirely
                try {
                    await audioContext.close();
                } catch {}
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                windNodes = null;
                await audioContext.resume();
                createWindAmbience(audioContext);
            }
        }

        function createWindAmbience(ctx) {
            try {
                const now = ctx.currentTime;
                const masterGain = ctx.createGain();
                masterGain.gain.setValueAtTime(0.08, now);
                masterGain.connect(ctx.destination);

                const bufferSize = ctx.sampleRate * 3;
                const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }

                const noiseSource = ctx.createBufferSource();
                noiseSource.buffer = noiseBuffer;
                noiseSource.loop = true;

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(600, now);
                filter.Q.setValueAtTime(3, now);

                const lfo = ctx.createOscillator();
                lfo.frequency.setValueAtTime(0.08, now);

                const lfoGain = ctx.createGain();
                lfoGain.gain.setValueAtTime(150, now);

                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                noiseSource.connect(filter);
                filter.connect(masterGain);

                noiseSource.start(now);
                lfo.start(now);

                // Track nodes so we can detect if they've been lost
                windNodes = { noiseSource, filter, lfo, lfoGain, masterGain };

                // Rebuild when the source naturally ends (shouldn't happen with loop=true,
                // but catches edge cases after interruption)
                noiseSource.onended = () => {
                    windNodes = null;
                };
            } catch (err) {
                console.error('Wind ambience creation failed:', err);
                windNodes = null;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Accumulate time since last frame
            delta += clock.getDelta();
            
            // Only render if enough time has passed for 60fps
            if (delta > interval) {
                render(delta);
                // Reduce delta by the interval, preserving any remainder to prevent drift
                delta = delta % interval;
            }
        }

        function updateSunPosition() {
            const azimuth = 180;
            const phi = THREE.MathUtils.degToRad(90 - sunElevation);
            const theta = THREE.MathUtils.degToRad(azimuth);
            sun.setFromSphericalCoords(1, phi, theta);
            
            // Update sky material with new sun position
            if (sky && sky.material.uniforms['sunPosition']) {
                sky.material.uniforms['sunPosition'].value.copy(sun);
            }
            
            // Update water material with new sun direction
            if (water && water.material.uniforms['sunDirection']) {
                water.material.uniforms['sunDirection'].value.copy(sun).normalize();
            }
        }

        function onKeyDown(event) {
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(event.key)) {
                event.preventDefault();
                keysHeld.add(event.key);
            }
        }

        function onKeyUp(event) {
            keysHeld.delete(event.key);
        }

        function render(deltaTime) {
            if (!isWindowActive) return;

            // Arrow key panning and sun control
            if (keysHeld.size > 0) {
                if (keysHeld.has('ArrowLeft'))  horizontalAngle += 0.02;
                if (keysHeld.has('ArrowRight')) horizontalAngle -= 0.02;
                if (keysHeld.has('ArrowUp'))    { sunElevation += 1.0; sunElevation = Math.min(180, sunElevation); updateSunPosition(); }
                if (keysHeld.has('ArrowDown'))  { sunElevation -= 1.0; sunElevation = Math.max(0, sunElevation);   updateSunPosition(); }
            }

            camera.rotation.set(0, horizontalAngle, 0, 'YXZ');
            
            // Use actual delta time, scaled down to keep ripple speed consistent
            water.material.uniforms['time'].value += deltaTime * 0.5;
            renderer.render(scene, camera);
        }

        function onMouseDown(event) {
            isDragging = true;
            previousMousePosition = { x: event.clientX, y: event.clientY };
            document.body.classList.add('grabbing');
        }

        function onMouseMove(event) {
            if (!isDragging) return;
            
            const deltaX = event.clientX - previousMousePosition.x;
            const deltaY = event.clientY - previousMousePosition.y;
            
            horizontalAngle -= deltaX * 0.005; // Sensitivity factor
            sunElevation -= deltaY * 0.3; // Vertical control for sun elevation
            sunElevation = Math.max(0, Math.min(180, sunElevation)); // Clamp to 0-180
            
            updateSunPosition();
            previousMousePosition = { x: event.clientX, y: event.clientY };
        }

        function onMouseUp() {
            isDragging = false;
            document.body.classList.remove('grabbing');
        }

        function onTouchStart(event) {
            isDragging = true;
            previousMousePosition = { x: event.touches[0].clientX, y: event.touches[0].clientY };
            document.body.classList.add('grabbing');
        }

        function onTouchMove(event) {
            if (!isDragging) return;
            
            const deltaX = event.touches[0].clientX - previousMousePosition.x;
            const deltaY = event.touches[0].clientY - previousMousePosition.y;
            
            horizontalAngle -= deltaX * 0.005; // Sensitivity factor
            sunElevation -= deltaY * 0.3; // Vertical control for sun elevation
            sunElevation = Math.max(0, Math.min(180, sunElevation)); // Clamp to 0-180
            
            updateSunPosition();
            previousMousePosition = { x: event.touches[0].clientX, y: event.touches[0].clientY };
        }

        function onTouchEnd() {
            isDragging = false;
            document.body.classList.remove('grabbing');
        }
    </script>
</body>
</html>
