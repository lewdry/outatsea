<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An interactive 3D seascape with touch controls and ambient wind.">
    <meta name="author" content="Lewis Dryburgh">
    <meta name="theme-color" content="#cce3eb">
    
    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lewdry.github.io/outatsea">
    <meta property="og:title" content="Out at sea">
    <meta property="og:description" content="An interactive 3D seascape with touch controls and ambient wind.">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://lewdry.github.io/outatsea">
    
    <title>Out at sea</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #cce3eb;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>

    <script async src="lib/es-module-shims/es-module-shims.js"></script>

    <script type="importmap">
      {
        "imports": {
          "three": "./lib/three/three.module.js",
          "three/addons/": "./lib/three/"
        }
      }
    </script>

    <style>
        body {
            cursor: grab;
        }
        body.grabbing {
            cursor: grabbing;
        }
    </style>
</head>
<body>

    <script type="module">
        import * as THREE from 'three';
        import { Water } from 'three/addons/objects/Water.js';
        import { Sky } from 'three/addons/objects/Sky.js';

        let scene, camera, renderer, water, sky, sun;
        let horizontalAngle = 0;
        let sunElevation = 165;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let audioContext = null;
        let isWindowActive = true;

        init();
        animate();

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 20000);
            // Keep camera stationary at center, rotate its orientation for orbit
            camera.position.set(0, 15, 0);

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.5;
            document.body.appendChild(renderer.domElement);

            // 3.5. Mouse/Touch Controls Setup
            renderer.domElement.addEventListener('mousedown', onMouseDown, false);
            renderer.domElement.addEventListener('mousemove', onMouseMove, false);
            renderer.domElement.addEventListener('mouseup', onMouseUp, false);
            renderer.domElement.addEventListener('touchstart', onTouchStart, false);
            renderer.domElement.addEventListener('touchmove', onTouchMove, false);
            renderer.domElement.addEventListener('touchend', onTouchEnd, false);

            // 4. Sun Position (Placed low on the horizon for a sunset/sunrise effect)
            sun = new THREE.Vector3();
            updateSunPosition();

            // 5. Water Setup
            const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
            
            // Using the official texture hosted locally
            const textureLoader = new THREE.TextureLoader();
            const normalMapUrl = 'assets/textures/waternormals.jpg';
            
            water = new Water(
                waterGeometry,
                {
                    textureWidth: 512,
                    textureHeight: 512,
                    waterNormals: textureLoader.load(normalMapUrl, function (texture) {
                        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                    }),
                    sunDirection: sun.clone().normalize(),
                    sunColor: 0xffffff,
                    waterColor: 0x001e0f,
                    distortionScale: 3.7,
                }
            );
            water.rotation.x = -Math.PI / 2; // Rotate flat to form the floor
            scene.add(water);

            // 6. Sky Setup
            sky = new Sky();
            sky.scale.setScalar(10000);
            scene.add(sky);

            const skyUniforms = sky.material.uniforms;
            skyUniforms['turbidity'].value = 10;
            skyUniforms['rayleigh'].value = 2;
            skyUniforms['mieCoefficient'].value = 0.005;
            skyUniforms['mieDirectionalG'].value = 0.8;
            skyUniforms['sunPosition'].value.copy(sun);

            // 7. Handle Window Resizing
            window.addEventListener('resize', onWindowResize);

            // 8. Initialize Ambient Audio (Algorithmic)
            initAudio();
        }

        function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch (error) {
                console.error('Failed to create audio context:', error);
                return;
            }
            
            // Resume audio context on user interaction (browser requirement)
            const resumeAudio = () => {
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume().catch(err => {
                        console.error('Failed to resume audio context:', err);
                    });
                }
            };
            document.addEventListener('click', resumeAudio, false);
            document.addEventListener('touchstart', resumeAudio, false);

            // Handle focus/blur and visibility changes to gracefully pause audio and animations
            document.addEventListener('visibilitychange', () => {
                if (!audioContext) return;
                if (document.hidden) {
                    // Page is hidden/minimized - suspend audio and pause animations
                    isWindowActive = false;
                    if (audioContext.state === 'running') {
                        audioContext.suspend().catch(err => {
                            console.error('Failed to suspend audio context:', err);
                        });
                    }
                } else {
                    // Page is visible/restored - resume audio and animations
                    isWindowActive = true;
                    if (audioContext.state === 'suspended') {
                        audioContext.resume().catch(err => {
                            console.error('Failed to resume audio context:', err);
                        });
                    }
                }
            });

            window.addEventListener('blur', () => {
                // Window lost focus
                isWindowActive = false;
                if (audioContext && audioContext.state === 'running') {
                    audioContext.suspend().catch(err => {
                        console.error('Failed to suspend audio context:', err);
                    });
                }
            });

            window.addEventListener('focus', () => {
                // Window regained focus
                isWindowActive = true;
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume().catch(err => {
                        console.error('Failed to resume audio context:', err);
                    });
                }
            });

            // Create wind ambience
            createWindAmbience(audioContext);
        }

        function createWindAmbience(audioContext) {
            const now = audioContext.currentTime;
            const masterGain = audioContext.createGain();
            masterGain.gain.setValueAtTime(0.08, now); // Slightly lower to keep it subtle
            masterGain.connect(audioContext.destination);

            // 1. Noise Generator
            const bufferSize = audioContext.sampleRate * 3;
            const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }

            const noiseSource = audioContext.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            noiseSource.loop = true;

            // 2. Filter (Lowpass creates the deep muffled roar of wind)
            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(600, now); 
            filter.Q.setValueAtTime(3, now); // Subtle resonance for character

            // 3. LFO to modulate the Filter Frequency (creates organic gusts)
            const lfo = audioContext.createOscillator();
            lfo.frequency.setValueAtTime(0.08, now); // Very slow rise and fall
            
            const lfoGain = audioContext.createGain();
            lfoGain.gain.setValueAtTime(150, now); // Sweeps the filter by +/- 150Hz

            // Audio Graph routing
            lfo.connect(lfoGain);
            lfoGain.connect(filter.frequency); // Modulate pitch, not volume

            noiseSource.connect(filter);
            filter.connect(masterGain);

            noiseSource.start(now);
            lfo.start(now);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            render();
        }

        function updateSunPosition() {
            const azimuth = 180;
            const phi = THREE.MathUtils.degToRad(90 - sunElevation);
            const theta = THREE.MathUtils.degToRad(azimuth);
            sun.setFromSphericalCoords(1, phi, theta);
            
            // Update sky material with new sun position
            if (sky && sky.material.uniforms['sunPosition']) {
                sky.material.uniforms['sunPosition'].value.copy(sun);
            }
            
            // Update water material with new sun direction
            if (water && water.material.uniforms['sunDirection']) {
                water.material.uniforms['sunDirection'].value.copy(sun).normalize();
            }
        }

        function render() {
            if (!isWindowActive) return; // Skip rendering if window is inactive
            
            // Rotate the camera around its own vertical axis based on input drag
            camera.rotation.set(0, horizontalAngle, 0, 'YXZ');
            
            // Animates the normal map texture to create the moving wave effect
            water.material.uniforms['time'].value += 1.0 / 60.0;
            renderer.render(scene, camera);
        }

        function onMouseDown(event) {
            isDragging = true;
            previousMousePosition = { x: event.clientX, y: event.clientY };
            document.body.classList.add('grabbing');
        }

        function onMouseMove(event) {
            if (!isDragging) return;
            
            const deltaX = event.clientX - previousMousePosition.x;
            const deltaY = event.clientY - previousMousePosition.y;
            
            horizontalAngle -= deltaX * 0.005; // Sensitivity factor
            sunElevation -= deltaY * 0.3; // Vertical control for sun elevation
            sunElevation = Math.max(0, Math.min(180, sunElevation)); // Clamp to 0-180
            
            updateSunPosition();
            previousMousePosition = { x: event.clientX, y: event.clientY };
        }

        function onMouseUp() {
            isDragging = false;
            document.body.classList.remove('grabbing');
        }

        function onTouchStart(event) {
            isDragging = true;
            previousMousePosition = { x: event.touches[0].clientX, y: event.touches[0].clientY };
            document.body.classList.add('grabbing');
        }

        function onTouchMove(event) {
            if (!isDragging) return;
            
            const deltaX = event.touches[0].clientX - previousMousePosition.x;
            const deltaY = event.touches[0].clientY - previousMousePosition.y;
            
            horizontalAngle -= deltaX * 0.005; // Sensitivity factor
            sunElevation -= deltaY * 0.3; // Vertical control for sun elevation
            sunElevation = Math.max(0, Math.min(180, sunElevation)); // Clamp to 0-180
            
            updateSunPosition();
            previousMousePosition = { x: event.touches[0].clientX, y: event.touches[0].clientY };
        }

        function onTouchEnd() {
            isDragging = false;
            document.body.classList.remove('grabbing');
        }
    </script>
</body>
</html>
